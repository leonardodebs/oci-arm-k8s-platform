<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCI ARM K8s Platform</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #f39100;
        }
        .status {
            font-size: 1.2rem;
            padding: 1rem 2rem;
            background: rgba(243, 145, 0, 0.2);
            border: 1px solid #f39100;
            border-radius: 8px;
            display: inline-block;
        }
        .info {
            margin-top: 2rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>OCI ARM Kubernetes Platform</h1>
        <div class="status">Status: Running</div>
        <div class="info">
            <p>Powered by Oracle Cloud Infrastructure</p>
            <p>Kubernetes Cluster on Ampere A1 ARM Instances</p>
        </div>
    </div>
</body>
</html>
