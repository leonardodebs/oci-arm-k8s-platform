apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    name: production
    environment: production
    managed-by: terraform
spec:
  finalizers:
    - kubernetes
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: production-quota
  namespace: production
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    pods: "10"
    services: "5"
    persistentvolumeclaims: "2"
  scopeSelector:
    matchExpressions:
      - operator: In
        scopeName: Pod
        values:
          - BestEffort
          - NotBestEffort
---
apiVersion: v1
kind: LimitRange
metadata:
  name: production-limits
  namespace: production
spec:
  limits:
    - max:
        cpu: "2"
        memory: 2Gi
      default:
        cpu: 100m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 256Mi
      type: Container