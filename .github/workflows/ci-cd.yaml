name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  OCI_REGION: sa-saopaulo-1
  OCIR_REPO: iad.ocir.io/$OCI_NAMESPACE
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OCI Container Registry
        uses: docker/login-action@v3
        with:
          registry: iad.ocir.io
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            iad.ocir.io/${{ secrets.OCI_NAMESPACE }}/nginx-demo:${{ github.sha }}
            iad.ocir.io/${{ secrets.OCI_NAMESPACE }}/nginx-demo:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCI CLI
        uses: oracle/oci-cli-setup@v3
        with:
          oci-api-key: ${{ secrets.OCI_API_KEY }}

      - name: Get OKE Cluster Credentials
        run: |
          oci ce cluster create-kubeconfig \
            --cluster-id ${{ secrets.OCI_CLUSTER_ID }} \
            --file ${{ github.workspace }}/kubeconfig \
            --region ${{ env.OCI_REGION }}

      - name: Configure kubectl
        run: |
          echo "KUBECONFIG=${{ github.workspace }}/kubeconfig" >> $GITHUB_ENV
          kubectl version

      - name: Deploy Namespace and Resources
        run: |
          kubectl apply -f kubernetes/namespaces/
          kubectl apply -f kubernetes/deployments/
          kubectl apply -f kubernetes/hpa/
          kubectl apply -f kubernetes/helm/

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/nginx-demo -n production
          kubectl rollout status deployment/ingress-nginx-controller -n ingress-nginx

      - name: Verify deployment
        run: |
          kubectl get pods -n production
          kubectl get svc -n production
          kubectl get nodes -o wide

      - name: Run smoke tests
        run: |
          # Wait a few seconds for services to be fully ready
          sleep 10
          # Test internal pod healthz
          kubectl exec -n production deployment/nginx-demo -- curl -f http://localhost/healthz
          kubectl get hpa -n production
          kubectl get pdb -n production